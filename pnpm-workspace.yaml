# the-last-aibender pnpm workspace (plan §2).
# spikes/ is deliberately NOT a workspace member — spike harnesses are
# quarantined (see spikes/README.md) and must never be importable by prod code.
packages:
  - packages/*
  - core
  - app
  # INTEG (plan §9.3 cross-department integration suite; @aibender/integration).
  # Assembles the BE/FE/SI seams end-to-end from already-frozen devices.
  - test/integration
# Dependency build scripts must be approved explicitly (pnpm 11 supply-chain
# guard). esbuild's postinstall only places its platform binary — approved.
# node-pty places/compiles its native addon on install (darwin prebuilds,
# node-gyp fallback) — approved for BE-2's ptyHost, same approval the SPIKE-D
# workspace carried (spikes/pty-supervision/pnpm-workspace.yaml).
allowBuilds:
  esbuild: true
  node-pty: true
minimumReleaseAgeExclude:
  - '@anthropic-ai/claude-agent-sdk-darwin-arm64@0.3.201'
  - '@anthropic-ai/claude-agent-sdk-darwin-x64@0.3.201'
  - '@anthropic-ai/claude-agent-sdk-linux-arm64-musl@0.3.201'
  - '@anthropic-ai/claude-agent-sdk-linux-arm64@0.3.201'
  - '@anthropic-ai/claude-agent-sdk-linux-x64-musl@0.3.201'
  - '@anthropic-ai/claude-agent-sdk-linux-x64@0.3.201'
  - '@anthropic-ai/claude-agent-sdk-win32-arm64@0.3.201'
  - '@anthropic-ai/claude-agent-sdk-win32-x64@0.3.201'
  - '@anthropic-ai/claude-agent-sdk@0.3.201'
  # BE-4: pinned to the exact serve binary version probed on this machine
  # (1.17.13) — the SSE/session contracts in core/src/adapters/opencode/ are
  # verified against it.
  - '@opencode-ai/sdk@1.17.13'
